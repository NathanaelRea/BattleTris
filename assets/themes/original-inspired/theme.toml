name = "Original Inspired"
kind = "theme"
format_version = 1
description = "Original-inspired data-driven theme pack using converted legacy PPM art plus generated cell atlases."
default_scale = 1.0

[legacy_sources]
notes = "Generated from usr/src/art/btstartup2.ppm, btbazaar.ppm, btbiff1.ppm, btgimp.ppm, and usr/src/game/BTConstants.H block sizing notes."

[sprites]
atlas = "images/blocks.png"
startup = "images/startup.png"
bazaar = "images/bazaar.png"
biff = "images/biff.png"
gimp = "images/gimp.png"

[fonts]
default = ""

[cell]
size = 23.0
gap = 1.5
shadow = 3.0

[layout.window]
width = 1040.0
height = 720.0

[layout.board]
top = 255.0
player_one_left = -360.0
player_two_left = 120.0
spacing = 480.0

[palette]
background = "#0b0d11"
board_background = "#1c2126"
empty = "#13161a"
structure = "#75787d"
happy = "#f7c938"
frown = "#806b57"
gimp = "#c72eba"
die = "#d9d2ba"
invisible = "#171a1c38"
hidden = "#060708"
text_primary = "#dce0d1"
text_secondary = "#bdc7b8"
text_accent = "#e6e0bd"
visible_colors = ["#b84a3a", "#4f88c6", "#e1bf45", "#6fa85d", "#9a62b5", "#ca7a3b", "#72b7ad"]

[button]
normal = "#b7b2aa"
hover = "#d3cec4"
pressed = "#8d8982"
text = "#111111"
