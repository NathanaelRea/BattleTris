name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: Package ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y pkg-config libasound2-dev

      - name: Fetch locked dependencies
        shell: bash
        run: cargo fetch --locked

      - name: Build package
        id: package
        shell: bash
        run: |
          archive_path="$(./scripts/package-release.sh)"
          ./scripts/smoke-package.sh "$archive_path"
          printf 'archive_path=%s\n' "$archive_path" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-battletris-package
          path: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.archive_path }}.sha256
          if-no-files-found: error

      - name: Attach GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.archive_path }}.sha256
