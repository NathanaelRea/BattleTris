name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust workspace
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run full check
        shell: bash
        run: ./scripts/full-check.sh

  package-smoke:
    name: Package smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build package
        shell: bash
        run: ./scripts/package-release.sh > /tmp/battletris-package-path.txt

      - name: Smoke package
        shell: bash
        run: ./scripts/smoke-package.sh "$(cat /tmp/battletris-package-path.txt)"
